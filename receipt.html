<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Enregistrement de reçu</title>
    <style>
        body {font-family: Arial, sans-serif; background: #f4f4f9; margin: 2rem;}
        .container {max-width: 500px; margin: auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        h1 {text-align: center; color: #333;}
        label {display:block; margin-top:1rem; font-weight:600;}
        input, textarea {width:100%; padding:0.5rem; margin-top:0.3rem; border:1px solid #ccc; border-radius:4px;}
        button {margin-top:1.5rem; width:100%; padding:0.7rem; background:#4a90e2; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size:1rem;}
        button:hover {background:#357ab8;}
    </style>
</head>
<body>
<div class="container">
    <h1>Enregistrer le reçu de transaction</h1>
    <form id="receiptForm" method="post" action="http://localhost:5000/record">
        <label for="address">Adresse du portefeuille</label>
        <input type="text" id="address" name="address" required placeholder="ex: 0xABC123...">

        <label for="txid">ID de transaction</label>
        <input type="text" id="txid" name="txid" required placeholder="ex: 1234567890">

        <label for="amount">Montant (USD)</label>
        <input type="number" step="0.01" id="amount" name="amount" required placeholder="ex: 100.00">

        <button type="submit">Envoyer</button>
    </form>
    <script>
        const form = document.getElementById('receiptForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: data
                });
                const result = await response.json();
                alert(result.message || 'Enregistrement réussi');
                form.reset();
            } catch (err) {
                alert('Erreur lors de l\'enregistrement du reçu');
            }
        });
    </script>
</div>
</body>
</html>
